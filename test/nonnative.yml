version: "1.0"
name: go-monolith
url: http://localhost:11000
log: reports/nonnative.log
processes:
  - name: server
    go:
      output: reports
      executable: ../go-monolith
      command: server
      parameters: ["-config file:.config/server.yml"]
    timeout: 5
    host: 127.0.0.1
    ports:
      - 11000
    log: reports/server.log
    readiness:
      - kind: http
        port: 11000
        path: /go-monolith/readyz
